name: Working Dirs and Shells
on: [push]
defaults:
  run:
    shell: bash
jobs:
  display-wd-info:
    runs-on: ubuntu-latest
    steps:
      - name: Displaying the current working directory nad list files
        run: |
          pwd
          ls -la
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY
          echo $GITHUB_WORKSPACE

  display-wd-info-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Displaying the current working directory nad list files
        run: |
          Get-Location
          dir
          echo $env:GITHUB_SHA
          echo $env:GITHUB_REPOSITORY
          echo $env:GITHUB_WORKSPACE
